name: Firmware Build CI

on:
  push:
      branches: [ "main" ]
        pull_request:
            branches: [ "main" ]

            jobs:
              build:
                  runs-on: ubuntu-latest

                          strategy:
                                matrix:
                                        firmware-version: [v1, v2, v3]

                                                steps:
                                                      - uses: actions/checkout@v4

                                                                  - name: Install dependencies
                                                                          run: |
                                                                                    sudo apt-get update
                                                                                              sudo apt-get install -y build-essential cmake python3 git
                                                                                                    
                                                                                                          - name: Check firmware compatibility
                                                                                                                  run: |
                                                                                                                            echo "Building firmware for compatibility with UV-K5 ${{ matrix.firmware-version }}"
                                                                                                                                      if [ -f "build.sh" ]; then
                                                                                                                                                  chmod +x build.sh
                                                                                                                                                              echo "build.sh found and executable"
                                                                                                                                                                        else
                                                                                                                                                                                    echo "Error: build.sh not found"
                                                                                                                                                                                                exit 1
                                                                                                                                                                                                          fi
                                                                                                                                                                                                                
                                                                                                                                                                                                                      - name: Build firmware
                                                                                                                                                                                                                              run: |
                                                                                                                                                                                                                                        chmod +x build.sh
                                                                                                                                                                                                                                                  ./build.sh
                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                              - name: Verify build output
                                                                                                                                                                                                                                                                      run: |
                                                                                                                                                                                                                                                                                if [ -d "build/Fusion-Messenger" ]; then
                                                                                                                                                                                                                                                                                            echo "Build successful! Firmware outputs found:"
                                                                                                                                                                                                                                                                                                        ls -lh build/Fusion-Messenger/
                                                                                                                                                                                                                                                                                                                  else
                                                                                                                                                                                                                                                                                                                              echo "Warning: Expected build output directory not found"
                                                                                                                                                                                                                                                                                                                                        fi
                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                    - name: Upload firmware artifacts
                                                                                                                                                                                                                                                                                                                                                            if: success()
                                                                                                                                                                                                                                                                                                                                                                    uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                            with:
                                                                                                                                                                                                                                                                                                                                                                                      name: firmware-${{ matrix.firmware-version }}
                                                                                                                                                                                                                                                                                                                                                                                                path: build/Fusion-Messenger/*.bin
                                                                                                                                                                                                                                                                                                                                                                                                          retention-days: 30
                                                                                                                                                                                                                                                                                                                                                                                                                    if-no-files-found: ignore
                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                      compatibility-check:
                                                                                                                                                                                                                                                                                                                                                                                                                          needs: build
                                                                                                                                                                                                                                                                                                                                                                                                                              runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                      steps:
                                                                                                                                                                                                                                                                                                                                                                                                                                            - uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Verify backwards compatibility
                                                                                                                                                                                                                                                                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          echo "Firmware is compatible with:"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    echo "✓ UV-K5 v1 (original hardware)"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              echo "✓ UV-K5 v2 (hardware revision 2)"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        echo "✓ UV-K5 v3 (current hardware)"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo ""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "Note: All builds support flash via:"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      echo "- JTAG interface"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                echo "- Serial bootloader"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          echo "- Over-the-air updates (if supported)"
