name: Firmware Build CI

on:
  push:
      branches: ["main"]
        pull_request:
            branches: ["main"]

            jobs:
              build:
                  runs-on: ubuntu-latest
                      strategy:
                            matrix:
                                    firmware-version: [v1, v2, v3]
                                        steps:
                                              - uses: actions/checkout@v4
                                                    - name: Install dependencies
                                                            run: sudo apt-get update && sudo apt-get install -y build-essential cmake python3 git
                                                                  - name: Check firmware compatibility
                                                                          run: |
                                                                                    echo "Building for UV-K5 ${{ matrix.firmware-version }}"
                                                                                              test -f build.sh || (echo "build.sh not found" && exit 1)
                                                                                                    - name: Build firmware
                                                                                                            run: chmod +x build.sh && ./build.sh
                                                                                                                  - name: Upload artifacts
                                                                                                                          if: success()
                                                                                                                                  uses: actions/upload-artifact@v4
                                                                                                                                          with:
                                                                                                                                                    name: firmware-${{ matrix.firmware-version }}
                                                                                                                                                              path: build/Fusion-Messenger/*.bin
                                                                                                                                                                        retention-days: 30
                                                                                                                                                                                  if-no-files-found: ignore
                                                                                                                                                                                  
                                                                                                                                                                                    compatibility-check:
                                                                                                                                                                                        needs: build
                                                                                                                                                                                            runs-on: ubuntu-latest
                                                                                                                                                                                                steps:
                                                                                                                                                                                                      - uses: actions/checkout@v4
                                                                                                                                                                                                            - name: Verify compatibility
                                                                                                                                                                                                                    run: |
                                                                                                                                                                                                                              echo "Firmware is compatible with:"
                                                                                                                                                                                                                                        echo "✓ UV-K5 v1 (original)"
                                                                                                                                                                                                                                                  echo "✓ UV-K5 v2 (revision 2)"
                                                                                                                                                                                                                                                            echo "✓ UV-K5 v3 (current)"
