name: Build UV-K5 V3 Messenger Firmware

on:
  push:
    branches: [ main, master, dev ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      preset:
        description: 'CMake preset to build'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - Fusion-Messenger
          - Fusion-Messenger-Scrambler

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FUSION_REPO:     armel/uv-k1-k5v3-firmware-custom
  ARM_GCC_VERSION: "12.3.rel1"
  FLASH_MAX:       "120832"   # PY32F071 = 118 KB

jobs:
  # ============================================================
  build:
    name: ${{ matrix.preset }}
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - preset:    Fusion-Messenger
            build_dir: build-messenger
            scrambler: "OFF"
          - preset:    Fusion-Messenger-Scrambler
            build_dir: build-scrambler
            scrambler: "ON"

    steps:
    # ----------------------------------------------------------
    - name: Checkout port repo
      uses: actions/checkout@v4
      with:
        path: port

    # ----------------------------------------------------------
    - name: Checkout Fusion firmware
      uses: actions/checkout@v4
      with:
        repository: ${{ env.FUSION_REPO }}
        path: firmware

    # ----------------------------------------------------------
    - name: Install ARM GCC ${{ env.ARM_GCC_VERSION }}
      uses: carlosperate/arm-none-eabi-gcc-action@v1
      with:
        release: ${{ env.ARM_GCC_VERSION }}

    # ----------------------------------------------------------
    - name: Install CMake + Ninja
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: "~3.28.0"
        ninjaVersion:  "~1.11.0"

    # ----------------------------------------------------------
    - name: Verify toolchain
      run: |
        arm-none-eabi-gcc --version
        cmake --version
        ninja --version

    # ----------------------------------------------------------
    - name: Copy port source files into Fusion tree
      run: |
        set -euo pipefail
        mkdir -p firmware/Helper
        cp port/Helper/fsk.h      firmware/Helper/
        cp port/Helper/fsk.c      firmware/Helper/
        cp port/Helper/crypto.h   firmware/Helper/
        cp port/Helper/crypto.c   firmware/Helper/
        cp port/App/messenger.h   firmware/App/
        cp port/App/messenger.c   firmware/App/
        cp port/App/bk4819_fsk.c  firmware/App/
        cp port/App/scrambler.h   firmware/App/
        echo "Port files in place:"
        ls -1 firmware/Helper/ firmware/App/messenger* \
               firmware/App/bk4819_fsk.c firmware/App/scrambler.h

    # ----------------------------------------------------------
    - name: Patch CMakeLists.txt
      working-directory: firmware
      run: |
        set -euo pipefail
        if grep -q "ENABLE_MESSENGER" CMakeLists.txt; then
          echo "Already patched — skipping"; exit 0
        fi
        cat >> CMakeLists.txt << 'EOF'

# ---- Messenger port additions ----------------------------------------
option(ENABLE_MESSENGER          "FSK SMS Messenger"                OFF)
option(ENABLE_MESSENGER_FSK_MUTE "Mute audio during FSK packet RX" ON)
option(ENABLE_ENCRYPTION         "ChaCha20-256 encryption"         OFF)
option(ENABLE_SCRAMBLER          "Voice frequency-inversion scrambler" OFF)

if(ENABLE_MESSENGER)
    target_compile_definitions(${PROJECT_NAME} PRIVATE ENABLE_MESSENGER=1)
    target_sources(${PROJECT_NAME} PRIVATE
        App/messenger.c
        App/bk4819_fsk.c
        Helper/fsk.c
    )
    if(ENABLE_MESSENGER_FSK_MUTE)
        target_compile_definitions(${PROJECT_NAME} PRIVATE ENABLE_MESSENGER_FSK_MUTE=1)
    endif()
    if(ENABLE_ENCRYPTION)
        target_compile_definitions(${PROJECT_NAME} PRIVATE ENABLE_ENCRYPTION=1)
        target_sources(${PROJECT_NAME} PRIVATE Helper/crypto.c)
    endif()
    target_link_libraries(${PROJECT_NAME} m)
endif()

if(ENABLE_SCRAMBLER)
    target_compile_definitions(${PROJECT_NAME} PRIVATE ENABLE_SCRAMBLER=1 SCRAMBLER_IMPL=1)
    target_link_libraries(${PROJECT_NAME} m)
endif()
# -----------------------------------------------------------------------
EOF
        echo "CMakeLists.txt patched"
        tail -25 CMakeLists.txt

    # ----------------------------------------------------------
    - name: Patch settings.h
      run: |
        python3 - << 'PYEOF'
import re, sys

path = "firmware/App/settings.h"
with open(path) as f:
    src = f.read()

if "MsgModulation" in src:
    print("settings.h already patched"); sys.exit(0)

new_fields = (
    "\n#ifdef ENABLE_MESSENGER\n"
    "    uint8_t  MsgModulation;\n"
    "    uint8_t  MsgEnc;\n"
    "    uint8_t  MsgRx;\n"
    "    uint8_t  MsgAck;\n"
    "    uint8_t  EncKey[32];\n"
    "#endif\n"
    "#ifdef ENABLE_SCRAMBLER\n"
    "    uint8_t  ScramblerMode;\n"
    "#endif\n"
)

m = re.search(r'(\}\s*(?:t_)?[Ss]ettings\s*;)', src)
if not m:
    print("ERROR: cannot find t_Settings closing brace"); sys.exit(1)
src = src[:m.start()] + new_fields + src[m.start():]

# Bump EEPROM config version so first boot re-inits cleanly
src = re.sub(
    r'(#define\s+EEPROM_CONFIG_VERSION\s+)(\d+)',
    lambda m: m.group(1) + str(int(m.group(2)) + 1),
    src
)

with open(path, "w") as f:
    f.write(src)
print("settings.h patched OK")
PYEOF

    # ----------------------------------------------------------
    - name: Patch app.c  (init / timeslice / key handler / scrambler TX)
      run: |
        python3 - << 'PYEOF'
import re, sys

path = "firmware/App/app.c"
with open(path) as f:
    src = f.read()

changes = 0

# 1. Includes
if "messenger.h" not in src:
    src = re.sub(
        r'(#include\s+"App/settings\.h")',
        r'\1\n'
        r'#ifdef ENABLE_MESSENGER\n#include "App/messenger.h"\n#endif\n'
        r'#ifdef ENABLE_SCRAMBLER\n#include "App/scrambler.h"\n#endif',
        src, count=1
    )
    changes += 1

# 2. Init calls after settings load
if "MESSENGER_Init" not in src:
    for anchor in ["SETTINGS_LoadSettings();", "SETTINGS_Load();", "APP_Init();"]:
        if anchor in src:
            src = src.replace(anchor,
                anchor
                + "\n#ifdef ENABLE_MESSENGER\n    MESSENGER_Init();\n#endif"
                + "\n#ifdef ENABLE_SCRAMBLER\n"
                  "    SCRAMBLER_Init((ScramblerMode_t)g_eeprom.Settings.ScramblerMode);\n"
                  "#endif",
                1)
            changes += 1
            break

# 3. 10 ms timeslice
if "MESSENGER_TimeSlice10ms" not in src:
    for anchor in ["APP_TimeSlice10ms", "TimeSlice10ms", "gReducedService"]:
        if anchor in src:
            idx   = src.find(anchor)
            brace = src.find("{", idx)
            if brace != -1:
                src = (src[:brace+1]
                    + "\n#ifdef ENABLE_MESSENGER\n    MESSENGER_TimeSlice10ms();\n#endif"
                    + src[brace+1:])
                changes += 1
            break

# 4. Key handler
if "MESSENGER_HandleKey" not in src:
    for anchor in ["APP_HandleKey(", "KEYBOARD_HandleKey(", "APP_ProcessKey("]:
        if anchor in src:
            idx   = src.find(anchor)
            brace = src.find("{", idx)
            if brace != -1:
                src = (src[:brace+1]
                    + "\n#ifdef ENABLE_MESSENGER\n"
                      "    if (MESSENGER_HandleKey(Key, bKeyPressed, bKeyHeld)) return;\n"
                      "#endif"
                    + src[brace+1:])
                changes += 1
            break

# 5. Scrambler enable on PTT press
if "SCRAMBLER_Enable" not in src:
    for anchor in ["RADIO_PrepareTX();", "APP_StartTX();", "gFlagStartTx = true;"]:
        if anchor in src:
            src = src.replace(anchor,
                anchor
                + "\n#ifdef ENABLE_SCRAMBLER\n"
                  "    if (g_eeprom.Settings.ScramblerMode != 0) SCRAMBLER_Enable();\n"
                  "#endif",
                1)
            changes += 1
            break

# 6. Scrambler disable on PTT release
if "SCRAMBLER_Disable" not in src:
    for anchor in ["RADIO_EndTX();", "APP_EndTX();", "gFlagEndTx = true;"]:
        if anchor in src:
            src = src.replace(anchor,
                "#ifdef ENABLE_SCRAMBLER\n    SCRAMBLER_Disable();\n#endif\n    " + anchor,
                1)
            changes += 1
            break

with open(path, "w") as f:
    f.write(src)
print(f"app.c patched — {changes} change(s)")
PYEOF

    # ----------------------------------------------------------
    - name: Patch audio RX path  (de-scrambler)
      run: |
        python3 - << 'PYEOF'
import re, sys, os

CANDIDATES = [
    "firmware/App/audio.c",
    "firmware/App/app.c",
    "firmware/App/bk4819.c",
]
ADC_PATTERNS = [
    "HAL_ADC_GetValue", "ADC_GetValue", "ADC1->DR", "hadc1",
]

target = None
for c in CANDIDATES:
    if os.path.exists(c):
        with open(c) as f:
            txt = f.read()
        if any(p in txt for p in ADC_PATTERNS):
            target = c
            break

if target is None:
    print("WARNING: No audio-sample file found; RX de-scrambler needs manual wiring")
    print("         TX scrambling still works. See patch/app_patch.c")
    sys.exit(0)

print(f"Patching RX de-scrambler into: {target}")
with open(target) as f:
    src = f.read()

if "SCRAMBLER_ProcessSample" in src:
    print("Already patched — skipping"); sys.exit(0)

changes = 0

# Include guard
if "scrambler.h" not in src:
    src = re.sub(
        r'(#include\s+"[^"]+\.h")',
        r'\1\n#ifdef ENABLE_SCRAMBLER\n#include "App/scrambler.h"\n#endif',
        src, count=1)
    changes += 1

# Wrap every ADC read with de-scrambler call
ADC_RE = re.compile(
    r'((?:uint16_t|int16_t|uint32_t)\s+(\w+)\s*=\s*'
    r'(?:HAL_ADC_GetValue\([^)]*\)|ADC_GetValue\([^)]*\)|ADC1->DR)\s*;)'
)
def wrap_adc(m):
    stmt, var = m.group(1), m.group(2)
    return (stmt
        + f"\n#ifdef ENABLE_SCRAMBLER\n"
          f"    if (g_eeprom.Settings.ScramblerMode != 0) {{\n"
          f"        int16_t _s = SCRAMBLER_ProcessSample({var});\n"
          f"        {var} = (uint16_t)(_s + 2048);\n"
          f"    }}\n"
          f"#endif")

new_src, n = ADC_RE.subn(wrap_adc, src)
if n:
    src = new_src; changes += n
    print(f"  Injected de-scrambler after {n} ADC read(s)")

# Hook squelch-open → SCRAMBLER_Enable (resets BFO phase per reception)
if "SCRAMBLER_Enable" not in src:
    for sq in ["SQUELCH_Open", "SquelchOpen(", "g_SquelchOpen"]:
        if sq in src:
            idx = src.find(sq); eol = src.find("\n", idx)
            src = (src[:eol]
                + "\n#ifdef ENABLE_SCRAMBLER\n"
                  "    if (g_eeprom.Settings.ScramblerMode != 0) SCRAMBLER_Enable();\n"
                  "#endif"
                + src[eol:])
            changes += 1
            print(f"  SCRAMBLER_Enable hooked onto squelch-open ({sq})")
            break

# Hook squelch-close → SCRAMBLER_Disable
if "SCRAMBLER_Disable" not in src:
    for sq in ["SQUELCH_Close", "SquelchClosed(", "g_SquelchClose"]:
        if sq in src:
            idx = src.find(sq); eol = src.find("\n", idx)
            src = (src[:eol]
                + "\n#ifdef ENABLE_SCRAMBLER\n    SCRAMBLER_Disable();\n#endif"
                + src[eol:])
            changes += 1
            print(f"  SCRAMBLER_Disable hooked onto squelch-close ({sq})")
            break

with open(target, "w") as f:
    f.write(src)
print(f"RX de-scrambler patch complete — {changes} change(s) in {target}")
PYEOF

    # ----------------------------------------------------------
    - name: Verify scrambler symbols present
      run: |
        python3 - << 'PYEOF'
import os

SYMBOLS = {
    "SCRAMBLER_Init":          ["firmware/App/app.c"],
    "SCRAMBLER_Enable":        ["firmware/App/app.c","firmware/App/audio.c","firmware/App/bk4819.c"],
    "SCRAMBLER_Disable":       ["firmware/App/app.c","firmware/App/audio.c","firmware/App/bk4819.c"],
    "SCRAMBLER_ProcessSample": ["firmware/App/audio.c","firmware/App/app.c","firmware/App/bk4819.c"],
}
missing = []
for sym, paths in SYMBOLS.items():
    found = any(os.path.exists(p) and sym in open(p).read() for p in paths)
    print(f"  {'OK' if found else 'MISSING':7s}  {sym}")
    if not found:
        missing.append(sym)

if missing:
    print(f"\nWARNING: {len(missing)} symbol(s) not auto-wired.")
    print("         Build continues — see patch/app_patch.c for manual steps.")
else:
    print("\nAll scrambler hooks present — TX scramble + RX de-scramble wired.")
PYEOF

    # ----------------------------------------------------------
    # Use explicit -S/-B flags so we always know the build dir path.
    # Do NOT use --preset here — preset binaryDir could be anything.
    - name: CMake configure — ${{ matrix.preset }}
      working-directory: firmware
      run: |
        set -euo pipefail

        # Detect the toolchain file — Fusion may call it arm-none-eabi.cmake
        # or embed everything in CMakeLists.txt itself.
        TC=""
        for candidate in \
            cmake/arm-none-eabi.cmake \
            cmake/toolchain.cmake \
            cmake/toolchain-arm-none-eabi.cmake; do
          if [ -f "$candidate" ]; then
            TC="-DCMAKE_TOOLCHAIN_FILE=$candidate"
            echo "Using toolchain file: $candidate"
            break
          fi
        done

        cmake -S . -B ${{ matrix.build_dir }} -G Ninja $TC \
          -DENABLE_MESSENGER=ON \
          -DENABLE_MESSENGER_FSK_MUTE=ON \
          -DENABLE_ENCRYPTION=ON \
          -DENABLE_SCRAMBLER=${{ matrix.scrambler }}

    # ----------------------------------------------------------
    - name: CMake build — ${{ matrix.preset }}
      working-directory: firmware
      run: |
        cmake --build ${{ matrix.build_dir }} --parallel $(nproc)

    # ----------------------------------------------------------
    - name: List build outputs
      working-directory: firmware
      run: |
        echo "=== All files in build dir ==="
        find ${{ matrix.build_dir }} -type f | sort
        echo ""
        echo "=== ELF files ==="
        find ${{ matrix.build_dir }} -name "*.elf" | sort
        echo "=== BIN files ==="
        find ${{ matrix.build_dir }} -name "*.bin" | sort || true

    # ----------------------------------------------------------
    # Generate .bin from every .elf via objcopy.
    # This is unconditional — safe even if cmake already ran objcopy,
    # because we check for duplicates before copying.
    - name: Generate .bin via objcopy
      working-directory: firmware
      run: |
        set -euo pipefail
        mkdir -p artifacts

        PRESET="${{ matrix.preset }}"
        BUILD="${{ matrix.build_dir }}"

        # ELF → BIN
        ELFS=$(find "$BUILD" -name "*.elf")
        if [ -z "$ELFS" ]; then
          echo "::error::No ELF files found in $BUILD — build may have failed"
          exit 1
        fi

        for elf in $ELFS; do
          base=$(basename "$elf" .elf)
          out="artifacts/${base}-${PRESET}.bin"
          echo "objcopy: $(basename $elf) → $(basename $out)"
          arm-none-eabi-objcopy -O binary "$elf" "$out"
        done

        # Copy any additional .bin already emitted by cmake post-build steps
        for bin in $(find "$BUILD" -name "*.bin" 2>/dev/null); do
          base=$(basename "$bin" .bin)
          dst="artifacts/${base}-${PRESET}-cmake.bin"
          [ ! -f "$dst" ] && cp "$bin" "$dst" && echo "Copied cmake bin: $(basename $bin)"
        done

        echo ""
        echo "=== Artifacts ==="
        ls -lh artifacts/

    # ----------------------------------------------------------
    - name: Flash budget check
      working-directory: firmware
      run: |
        set -euo pipefail
        FAIL=0
        for bin in artifacts/*.bin; do
          SZ=$(wc -c < "$bin")
          PCT=$(( SZ * 100 / ${{ env.FLASH_MAX }} ))
          printf "%-55s  %6d B  (%d%% of 118 KB)\n" "$(basename $bin)" "$SZ" "$PCT"
          if [ "$SZ" -gt "${{ env.FLASH_MAX }}" ]; then
            echo "::error::$(basename $bin) exceeds PY32F071 flash limit!"
            FAIL=1
          fi
        done
        exit $FAIL

    # ----------------------------------------------------------
    - name: Write flash instructions
      working-directory: firmware
      run: |
        cat > artifacts/FLASH_INSTRUCTIONS.txt << 'EOF'
UV-K5 V3 / UV-K1 — Firmware Flashing Instructions
===================================================

STEP 0 — BACKUP CALIBRATION (do this every time before flashing)
  1. Open https://armel.github.io/uvtools2/ in Chrome or Edge (desktop)
  2. "Dump Calib" tab → connect radio via Kenwood cable (3.5mm + 2.5mm)
     ⚠ USB-C is power-only and cannot flash firmware
  3. Save the calibration .bin file somewhere safe

STEP 1 — ENTER DFU MODE
  1. Power the radio OFF
  2. Hold PTT, then press Power — screen stays blank = DFU mode

STEP 2 — FLASH
  1. https://armel.github.io/uvtools2/ → "Flash Firmware"
  2. Select the .bin file from this artifact
  3. Choose your serial/COM port → Flash → wait for green bar
  4. Power-cycle the radio

FIRST BOOT
  Settings reset to defaults (EEPROM version bumped). Reconfigure channels.

MESSENGER  (F + MENU to open)
  *      cycle ABC / abc / 123 input modes
  0-9    multi-tap character input
  MENU   transmit on active VFO
  F      backspace  |  F long = clear all  |  UP = recall last sent
  EXIT   close messenger

NEW MENU ITEMS
  MsgMod   FSK modulation  (FSK450 / FSK700 / AFSK1200)
  MsgRx    Background FSK listener  (ON / OFF)
  MsgAck   Auto-ACK on receive  (ON / OFF)
  MsgEnc   ChaCha20 encryption  (ON / OFF)
  EncKey   Key preview (first 4 bytes as hex)
  Scrambl  Voice scrambler  (OFF / 2000 / 2500 / 2700 / 3000 Hz)

SCRAMBLER NOTE
  Same Scrambl setting de-scrambles received audio automatically.
  Frequency inversion is self-inverse — no separate de-scrambler needed.
  Both radios must use the same Scrambl value.

INTEROPERABILITY
  FSK-compatible with kamilsss655 V1/V2 firmware.
  Both sides must use the same MsgMod and EncKey.
EOF

    # ----------------------------------------------------------
    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.preset }}
        path: firmware/artifacts/
        retention-days: 90
        if-no-files-found: error

    # ----------------------------------------------------------
    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: logs-${{ matrix.preset }}
        path: |
          firmware/*.log
          firmware/${{ matrix.build_dir }}/CMakeFiles/CMakeOutput.log
          firmware/${{ matrix.build_dir }}/CMakeFiles/CMakeError.log
        retention-days: 7
        if-no-files-found: ignore

    # ----------------------------------------------------------
    - name: Job summary
      if: always()
      working-directory: firmware
      run: |
        {
          echo "## ${{ matrix.preset }}"
          echo ""
          if ls artifacts/*.bin 1>/dev/null 2>&1; then
            echo "### ✅ Firmware files"
            echo '```'
            for bin in artifacts/*.bin; do
              SZ=$(wc -c < "$bin")
              PCT=$(( SZ * 100 / ${{ env.FLASH_MAX }} ))
              printf "%-50s  %6d B  (%d%%)\n" "$(basename $bin)" "$SZ" "$PCT"
            done
            echo '```'
            echo ""
            echo "**Flash via:** https://armel.github.io/uvtools2/"
          else
            echo "### ❌ No .bin files — check build logs artifact"
          fi
        } >> $GITHUB_STEP_SUMMARY


  # ============================================================
  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - name: Download all build artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-bins/

    - name: List downloaded files
      run: find release-bins/ -type f | sort

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: UV-K5 V3 Messenger ${{ github.ref_name }}
        body: |
          ## UV-K5 V3 / UV-K1 — SMS Messenger + Voice Scrambler

          Ported from [kamilsss655/uv-k5-firmware-custom](https://github.com/kamilsss655/uv-k5-firmware-custom)
          onto [armel/uv-k1-k5v3-firmware-custom](https://github.com/armel/uv-k1-k5v3-firmware-custom) (Fusion).

          | File | Contents |
          |------|----------|
          | `*-Fusion-Messenger.bin` | Messenger + ChaCha20 encryption |
          | `*-Fusion-Messenger-Scrambler.bin` | + voice scrambler / de-scrambler |

          ### How to flash
          1. Backup calibration at https://armel.github.io/uvtools2/ → **Dump Calib**
          2. Flash at https://armel.github.io/uvtools2/ → **Flash Firmware**
          3. Use the **Kenwood 3.5mm+2.5mm cable** — USB-C is power-only
          4. DFU mode: power off → hold PTT → press power

          ### New controls
          **F + MENU** open messenger · **\*** cycle keyboard · **MENU** send

          New menu items: `MsgMod` `MsgRx` `MsgAck` `MsgEnc` `EncKey` `Scrambl`

          ### Compatibility
          FSK-compatible with kamilsss655 V1/V2 firmware (same modulation + key required).
        files: release-bins/**/*.bin
        fail_on_unmatched_files: true
        draft: false
        prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
