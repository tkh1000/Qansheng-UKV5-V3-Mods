name: Build UV-K5 V3 Messenger Firmware

on:
  push:
    branches: [main, master, dev]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      variant:
        description: Build variant
        required: false
        default: all
        type: choice
        options: [all, Fusion-Messenger, Fusion-Messenger-Scrambler]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FUSION_REPO: armel/uv-k1-k5v3-firmware-custom
  ARM_GCC_VERSION: "12.3.Rel1"
  FLASH_MAX_BYTES: "120832"

jobs:

  build:
    name: ${{ matrix.preset }}
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: Fusion-Messenger
            build_dir: build-messenger
            scrambler: "OFF"
          - preset: Fusion-Messenger-Scrambler
            build_dir: build-scrambler
            scrambler: "ON"

    steps:

      - name: Checkout port repository
        uses: actions/checkout@v4
        with:
          path: port

      - name: Checkout Fusion firmware
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FUSION_REPO }}
          path: firmware

      - name: Install ARM GCC ${{ env.ARM_GCC_VERSION }}
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: ${{ env.ARM_GCC_VERSION }}

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.28.0"
          ninjaVersion: "~1.11.0"

      - name: Verify toolchain
        run: |
          arm-none-eabi-gcc --version
          cmake --version
          ninja --version

      - name: Probe Fusion source directory structure
        run: python3 port/scripts/probe_structure.py

      - name: Copy port source files into Fusion tree
        run: |
          set -euo pipefail
          SRC="${FW_SRC_DIR}"
          echo "Source dir: $SRC"
          PARENT=$(dirname "$SRC")

          HELPER=""
          for d in "$PARENT/Helper" "$PARENT/helper" "$SRC/Helper" "$SRC/helper"; do
            if [ -d "$d" ]; then HELPER="$d"; break; fi
          done
          if [ -z "$HELPER" ]; then
            HELPER="$PARENT/Helper"
            mkdir -p "$HELPER"
          fi
          echo "Helper dir: $HELPER"

          cp port/Helper/fsk.h      "$HELPER/"
          cp port/Helper/fsk.c      "$HELPER/"
          cp port/Helper/crypto.h   "$HELPER/"
          cp port/Helper/crypto.c   "$HELPER/"
          cp port/App/messenger.h   "$SRC/"
          cp port/App/messenger.c   "$SRC/"
          cp port/App/bk4819_fsk.c  "$SRC/"
          cp port/App/scrambler.h   "$SRC/"

          echo "Port files in place:"
          find "$SRC" "$HELPER" \( -name "*.h" -o -name "*.c" \) \
            | grep -E "fsk|crypto|messenger|scrambler|bk4819_fsk" | sort

      - name: Patch CMakeLists.txt
        run: python3 port/scripts/patch_cmake.py

      - name: Patch settings.h
        run: python3 port/scripts/patch_settings.py

      - name: Patch app.c
        run: python3 port/scripts/patch_app.py

      - name: Patch audio RX path (de-scrambler)
        run: python3 port/scripts/patch_audio.py

      - name: Verify scrambler hooks
        run: python3 port/scripts/verify_hooks.py

      # Use the upstream Fusion preset as the base so the linker script,
      # source lists, and add_executable(f4hwn) are all set up correctly.
      # We supply our own toolchain file because the preset's toolchain path
      # points inside a Docker container that doesn't exist on the runner.
      # CMAKE_CROSSCOMPILING=TRUE is required: without it Fusion's CMake
      # skips add_executable(f4hwn) inside if(CMAKE_CROSSCOMPILING).
      - name: CMake configure (Fusion preset + ARM toolchain)
        working-directory: firmware
        run: |
          set -euo pipefail
          echo "arm-none-eabi-gcc: $(which arm-none-eabi-gcc)"
          arm-none-eabi-gcc --version | head -1

          cmake --preset Fusion \
            -B ${{ matrix.build_dir }} \
            -DCMAKE_TOOLCHAIN_FILE=../port/cmake/arm-none-eabi-toolchain.cmake \
            -DENABLE_MESSENGER=ON \
            -DENABLE_MESSENGER_FSK_MUTE=ON \
            -DENABLE_ENCRYPTION=ON \
            -DENABLE_SCRAMBLER=${{ matrix.scrambler }}

      - name: CMake build
        working-directory: firmware
        run: cmake --build ${{ matrix.build_dir }} --parallel $(nproc)

      - name: List build outputs
        working-directory: firmware
        run: |
          echo "=== All files in build dir ==="
          find ${{ matrix.build_dir }} -type f | sort
          echo "=== ELF files ==="
          find ${{ matrix.build_dir }} -name "*.elf" | sort
          echo "=== BIN / HEX files ==="
          find ${{ matrix.build_dir }} \( -name "*.bin" -o -name "*.hex" \) | sort || true

      - name: Generate .bin via objcopy
        working-directory: firmware
        run: |
          set -euo pipefail
          mkdir -p artifacts
          PRESET="${{ matrix.preset }}"
          BUILD="${{ matrix.build_dir }}"

          ELFS=$(find "$BUILD" -name "*.elf")
          if [ -z "$ELFS" ]; then
            echo "::error::No ELF files found -- build may have failed"
            exit 1
          fi
          for elf in $ELFS; do
            base=$(basename "$elf" .elf)
            out="artifacts/${base}-${PRESET}.bin"
            echo "objcopy: $(basename $elf) -> $(basename $out)"
            arm-none-eabi-objcopy -O binary "$elf" "$out"
          done

          for bin in $(find "$BUILD" -name "*.bin" 2>/dev/null); do
            base=$(basename "$bin" .bin)
            dst="artifacts/${base}-${PRESET}-cmake.bin"
            [ ! -f "$dst" ] && cp "$bin" "$dst" && echo "Copied: $(basename $bin)"
          done

          echo "=== Artifacts ==="
          ls -lh artifacts/

      - name: Flash budget check
        working-directory: firmware
        run: |
          set -euo pipefail
          FAIL=0
          MAX=${{ env.FLASH_MAX_BYTES }}
          for bin in artifacts/*.bin; do
            SZ=$(wc -c < "$bin")
            PCT=$(( SZ * 100 / MAX ))
            printf "%-55s  %6d B  (%d%% of 118 KB)\n" "$(basename $bin)" "$SZ" "$PCT"
            if [ "$SZ" -gt "$MAX" ]; then
              echo "::error::$(basename $bin) exceeds PY32F071 flash limit!"
              FAIL=1
            fi
          done
          exit $FAIL

      - name: Write flash instructions
        working-directory: firmware
        run: python3 ../port/scripts/write_flash_instructions.py artifacts/FLASH_INSTRUCTIONS.txt

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.preset }}
          path: firmware/artifacts/
          retention-days: 90
          if-no-files-found: error

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.preset }}
          path: |
            firmware/${{ matrix.build_dir }}/CMakeFiles/CMakeOutput.log
            firmware/${{ matrix.build_dir }}/CMakeFiles/CMakeError.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Job summary
        if: always()
        working-directory: firmware
        run: |
          MAX=${{ env.FLASH_MAX_BYTES }}
          {
            echo "## ${{ matrix.preset }}"
            echo ""
            if ls artifacts/*.bin 1>/dev/null 2>&1; then
              echo "### Build succeeded"
              echo "\`\`\`"
              for bin in artifacts/*.bin; do
                SZ=$(wc -c < "$bin")
                PCT=$(( SZ * 100 / MAX ))
                printf "%-50s  %6d B  (%d%%)\n" "$(basename $bin)" "$SZ" "$PCT"
              done
              echo "\`\`\`"
              echo ""
              echo "Flash via: https://armel.github.io/uvtools2/"
            else
              echo "### Build failed - check logs artifact"
            fi
          } >> $GITHUB_STEP_SUMMARY


  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-bins/

      - name: List downloaded files
        run: find release-bins/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: UV-K5 V3 Messenger ${{ github.ref_name }}
          body: |
            ## UV-K5 V3 / UV-K1 - SMS Messenger + Voice Scrambler

            Ported from kamilsss655/uv-k5-firmware-custom onto armel/uv-k1-k5v3-firmware-custom (Fusion).

            | File | Contents |
            |------|----------|
            | *-Fusion-Messenger.bin | Messenger + ChaCha20 encryption |
            | *-Fusion-Messenger-Scrambler.bin | + voice scrambler / de-scrambler |

            ### How to flash
            1. Backup calibration at https://armel.github.io/uvtools2/ (Dump Calib)
            2. Flash at https://armel.github.io/uvtools2/ (Flash Firmware)
            3. Use the Kenwood 3.5mm+2.5mm cable - USB-C is power-only
            4. DFU mode: power off, hold PTT, press power

            ### New controls
            F + MENU = open messenger, * = cycle keyboard, MENU = send

            New menu items: MsgMod MsgRx MsgAck MsgEnc EncKey Scrambl

            ### Scrambler
            Both radios need the same Scrambl setting. De-scrambling is automatic.

            ### Compatibility
            FSK-compatible with kamilsss655 V1/V2 firmware (same MsgMod + EncKey).
          files: release-bins/**/*.bin
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
